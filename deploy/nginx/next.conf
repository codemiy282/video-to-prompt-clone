# Reverse proxy cho Next.js 16 frontend (chạy trên docker, port 3000).
# Đặt file này vào /etc/nginx/sites-available/next.conf rồi symlink sang
# /etc/nginx/sites-enabled/, sau đó `nginx -t && systemctl reload nginx`.
#
# NHỚ thay `your-domain.com` bằng domain thật của bạn (3 chỗ).

# HTTP -> HTTPS + challenge cho Let's Encrypt
server {
    listen 80;
    server_name your-domain.com;

    # Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Upload lớn (ảnh/video gửi qua Next API route tới backend LTX)
    client_max_body_size 1g;

    # TẮT buffering để Next.js 16 streaming (Suspense/PPR) hoạt động đúng
    proxy_set_header X-Accel-Buffering no;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Keep-alive + timeout dài cho video generation
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
