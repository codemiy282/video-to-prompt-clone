# Deploy the app on a normal VPS (no GPU required).
#
# Prereqs on the host:
#   - Docker + Docker Compose v2.3+
#   - A `.env` file (copy from .env.example) with GEMINI_API_KEY set
#
# Build & run:
#   docker compose --env-file .env up -d --build
#
# App:  http://localhost:3000

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Read at runtime by the Next.js server (server-side API routes).
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    restart: unless-stopped
